<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>冒頭収集館</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Zen+Old+Mincho:wght@400;700;900&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --dur: .48s;
  --ease: cubic-bezier(.76,0,.24,1);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #050505;
  font-family: 'Shippori Mincho', serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* PC：中央に固定幅で表示 */
#app {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  /* PC時に左右に微かな影でスマホ感を演出 */
  box-shadow: 0 0 80px rgba(0,0,0,.8);
}

/* PC背景：グリッド模様で奥行き感 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ==============================
   DECK: カードスタック
============================== */
#deck {
  position: absolute;
  inset: 0;
}

/* ==============================
   CARD
============================== */
.card {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  will-change: transform, opacity;
  transform: translateY(100vh);
  transition: transform var(--dur) var(--ease), opacity var(--dur) ease;
  opacity: 0;
  /* カード内の縦スクロールを許可 */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card.is-current {
  transform: translateY(0);
  opacity: 1;
}

.card.is-above {
  transform: translateY(-100vh);
  opacity: 0;
}

.card.is-drag {
  transition: none;
}

/* ==============================
   CARD BG — ジャンルごとの世界観
============================== */
.card-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* ジャンル別カラースキーム */
.card[data-g="純文学"] .card-bg {
  background: linear-gradient(160deg, #1a1614 0%, #2d2118 40%, #1a1614 100%);
}
.card[data-g="探偵・推理"] .card-bg {
  background: linear-gradient(160deg, #0d1520 0%, #102035 40%, #0d1520 100%);
}
.card[data-g="怪談・怪異"] .card-bg {
  background: linear-gradient(160deg, #120d1a 0%, #1e1228 40%, #120d1a 100%);
}
.card[data-g="恋愛・情念"] .card-bg {
  background: linear-gradient(160deg, #1a0d10 0%, #2a1018 40%, #1a0d10 100%);
}
.card[data-g="歴史・時代"] .card-bg {
  background: linear-gradient(160deg, #160f08 0%, #261808 40%, #160f08 100%);
}
.card[data-g="幻想・耽美"] .card-bg {
  background: linear-gradient(160deg, #0d1a14 0%, #102614 40%, #0d1a14 100%);
}
.card[data-g="社会・風俗"] .card-bg {
  background: linear-gradient(160deg, #101614 0%, #152018 40%, #101614 100%);
}

/* ノイズ感 */
.card-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: .5;
  pointer-events: none;
}

/* ==============================
   GENRE ACCENT LINE
============================== */
.card-accent {
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 2px;
  z-index: 10;
}
.card[data-g="純文学"]    .card-accent { background: linear-gradient(90deg, #c4621a, #e8a04a, transparent); }
.card[data-g="探偵・推理"] .card-accent { background: linear-gradient(90deg, #2a6090, #4a9cc8, transparent); }
.card[data-g="怪談・怪異"] .card-accent { background: linear-gradient(90deg, #6a2090, #a050d0, transparent); }
.card[data-g="恋愛・情念"] .card-accent { background: linear-gradient(90deg, #902040, #d04070, transparent); }
.card[data-g="歴史・時代"] .card-accent { background: linear-gradient(90deg, #8a5010, #c88030, transparent); }
.card[data-g="幻想・耽美"] .card-accent { background: linear-gradient(90deg, #1a7a40, #30b060, transparent); }
.card[data-g="社会・風俗"] .card-accent { background: linear-gradient(90deg, #2a6a40, #40a060, transparent); }

/* ==============================
   TOP META
============================== */
.card-top {
  position: relative; z-index: 10;
  padding: 52px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}

.meta-genre {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.genre-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  opacity: .45;
}
.card[data-g="純文学"]    .genre-name { color: #e8a04a; }
.card[data-g="探偵・推理"] .genre-name { color: #4a9cc8; }
.card[data-g="怪談・怪異"] .genre-name { color: #a050d0; }
.card[data-g="恋愛・情念"] .genre-name { color: #d04070; }
.card[data-g="歴史・時代"] .genre-name { color: #c88030; }
.card[data-g="幻想・耽美"] .genre-name { color: #30b060; }
.card[data-g="社会・風俗"] .genre-name { color: #40a060; }

.pattern-name {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,.2);
}

.meta-counter {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  color: rgba(255,255,255,.18);
  letter-spacing: 1px;
}

/* ==============================
   MAIN TEXT AREA
============================== */
.card-text-wrap {
  flex: 1;
  position: relative;
  z-index: 5;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 24px 20px 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card-text {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: 'Zen Old Mincho', 'Shippori Mincho', serif;
  font-size: clamp(17px, 4.5vw, 22px);
  line-height: 2.1;
  letter-spacing: .12em;
  color: rgba(240, 228, 210, .88);
  /* 全文表示 */
  height: auto;
  overflow: visible;
}

/* ==============================
   BOTTOM INFO
============================== */
.card-bottom {
  display: none;
}

.card-divider {
  height: 1px;
  margin-bottom: 16px;
  opacity: .12;
}
.card[data-g="純文学"]    .card-divider { background: linear-gradient(90deg, #e8a04a, transparent); }
.card[data-g="探偵・推理"] .card-divider { background: linear-gradient(90deg, #4a9cc8, transparent); }
.card[data-g="怪談・怪異"] .card-divider { background: linear-gradient(90deg, #a050d0, transparent); }
.card[data-g="恋愛・情念"] .card-divider { background: linear-gradient(90deg, #d04070, transparent); }
.card[data-g="歴史・時代"] .card-divider { background: linear-gradient(90deg, #c88030, transparent); }
.card[data-g="幻想・耽美"] .card-divider { background: linear-gradient(90deg, #30b060, transparent); }
.card[data-g="社会・風俗"] .card-divider { background: linear-gradient(90deg, #40a060, transparent); }

.card-author-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
}

.author-info { flex: 1; min-width: 0; }
.author-name {
  font-size: 16px;
  font-weight: 700;
  color: rgba(240,228,210,.82);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.work-title {
  font-size: 11px;
  color: rgba(240,228,210,.3);
  letter-spacing: 1px;
}

.card-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.btn-src {
  background: none;
  border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.3);
  font-family: 'Shippori Mincho', serif;
  font-size: 10px;
  padding: 6px 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: all .2s;
  letter-spacing: 1px;
}
.btn-src:active { background: rgba(255,255,255,.06); color: rgba(255,255,255,.6); }

.btn-lend {
  background: none;
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.4);
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  padding: 7px 16px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 1px;
}
.btn-lend:active { background: rgba(255,255,255,.08); }
.btn-lend.is-lent {
  background: rgba(200,100,40,.15);
  border-color: rgba(200,120,40,.5);
  color: #e8a04a;
}

/* ==============================
   SWIPE HINT
============================== */
#swipe-hint {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  animation: hintOut 1s ease 2.5s forwards;
}
.hint-arrows {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  animation: hintBounce 1s ease infinite;
}
.hint-arr { font-size: 14px; color: rgba(255,255,255,.2); line-height: 1; }
.hint-arr:first-child { opacity: .4; }
.hint-txt { font-size: 8px; letter-spacing: 4px; color: rgba(255,255,255,.15); }

@keyframes hintBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}
@keyframes hintOut {
  to { opacity: 0; }
}

/* ==============================
   FIXED UI
============================== */
/* フィルターボタン */
#btn-filter {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 300;
  width: 36px; height: 36px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 50%;
  color: rgba(255,255,255,.4);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  touch-action: manipulation;
}
#btn-filter:active { background: rgba(255,255,255,.12); }

/* 書棚ボタン */
#btn-shelf {
  position: absolute;
  top: 64px;
  right: 20px;
  z-index: 300;
  width: 36px; height: 36px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 50%;
  color: rgba(255,255,255,.4);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  touch-action: manipulation;
}
#btn-shelf:active { background: rgba(255,255,255,.12); }
.shelf-badge {
  position: absolute;
  top: -4px; right: -4px;
  width: 16px; height: 16px;
  background: #c4621a;
  border-radius: 50%;
  font-size: 9px;
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
}

/* インジケーター */
#progress {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 5px;
  pointer-events: none;
}
.prog-dot {
  width: 2px;
  height: 2px;
  border-radius: 1px;
  background: rgba(255,255,255,.18);
  transition: all .3s ease;
}
.prog-dot.on {
  height: 18px;
  background: rgba(255,255,255,.45);
}

/* ==============================
   FILTER DRAWER
============================== */
#filter-drawer {
  position: absolute;
  inset: 0;
  z-index: 400;
  pointer-events: none;
}
#filter-drawer.open { pointer-events: all; }

#filter-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  opacity: 0;
  transition: opacity .3s;
}
#filter-drawer.open #filter-backdrop { opacity: 1; }

#filter-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: min(280px, 80vw);
  background: #111;
  border-left: 1px solid rgba(255,255,255,.07);
  padding: 60px 24px 40px;
  transform: translateX(100%);
  visibility: hidden;
  transition: transform .35s var(--ease);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#filter-drawer.open #filter-panel { transform: translateX(0); visibility: visible; }

.filter-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(255,255,255,.2);
  margin-bottom: 8px;
}

.f-item {
  background: none;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,.05);
  color: rgba(255,255,255,.35);
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  padding: 12px 0;
  cursor: pointer;
  text-align: left;
  letter-spacing: 2px;
  transition: color .18s;
  touch-action: manipulation;
}
.f-item:active, .f-item.on { color: rgba(255,255,255,.85); }
.f-item.on::before {
  content: '— ';
  color: rgba(255,255,255,.3);
}

/* ==============================
   SHELF：全画面リーダー
============================== */
#shelf-drawer {
  position: absolute;
  inset: 0;
  z-index: 400;
  pointer-events: none;
}
#shelf-drawer.open { pointer-events: all; }

#shelf-panel {
  position: absolute;
  inset: 0;
  background: #0d0d0d;
  transform: translateY(100%);
  transition: transform .4s var(--ease);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#shelf-drawer.open #shelf-panel { transform: translateY(0); }

.shelf-hd {
  padding: 52px 24px 16px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(255,255,255,.05);
  flex-shrink: 0;
}
.shelf-ttl {
  font-size: 11px; letter-spacing: 4px;
  color: rgba(255,255,255,.3);
}
.shelf-close {
  background: none; border: none;
  color: rgba(255,255,255,.25); font-size: 18px; cursor: pointer;
  touch-action: manipulation; padding: 4px;
}

/* 書棚：作品リスト ↔ 全文ビュー の2画面 */
#shelf-list-view, #shelf-reader-view {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
}
#shelf-reader-view { display: none; }

.shelf-bd { overflow-y: auto; padding: 8px 24px 40px; flex: 1; }
.shelf-empty {
  text-align: center;
  color: rgba(255,255,255,.15);
  font-size: 11px; letter-spacing: 2px;
  padding: 52px 0; line-height: 3;
}

/* リストアイテム */
.s-item {
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
}
.s-item:active { background: rgba(255,255,255,.02); }
.s-info { flex: 1; min-width: 0; }
.s-ttl {
  font-size: 14px; color: rgba(255,255,255,.65);
  margin-bottom: 4px; letter-spacing: 1px;
}
.s-auth { font-size: 10px; color: rgba(255,255,255,.2); letter-spacing: 1px; }
.s-arrow { color: rgba(255,255,255,.15); font-size: 14px; flex-shrink: 0; }

/* リーダービュー */
.reader-hd {
  padding: 16px 24px 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  flex-shrink: 0;
}
.reader-back {
  background: none; border: none;
  color: rgba(255,255,255,.3); font-size: 16px;
  cursor: pointer; touch-action: manipulation;
  padding: 4px 8px 4px 0;
}
.reader-meta { flex: 1; }
.reader-title { font-size: 13px; color: rgba(255,255,255,.6); letter-spacing: 1px; }
.reader-author { font-size: 10px; color: rgba(255,255,255,.25); letter-spacing: 1px; margin-top: 2px; }
.reader-acts { display: flex; gap: 8px; flex-shrink: 0; }
.reader-src {
  background: none; border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.3); font-family: 'Shippori Mincho', serif;
  font-size: 9px; padding: 4px 10px; cursor: pointer;
  text-decoration: none; display: inline-block; letter-spacing: 1px;
  touch-action: manipulation;
}
.reader-ret {
  background: none; border: 1px solid rgba(200,100,40,.3);
  color: rgba(200,120,40,.6); font-family: 'Shippori Mincho', serif;
  font-size: 9px; padding: 4px 10px; cursor: pointer;
  touch-action: manipulation; letter-spacing: 1px;
}

.reader-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 24px 20px 40px;
  -webkit-overflow-scrolling: touch;
}
.reader-text {
  writing-mode: vertical-rl;
  font-family: 'Zen Old Mincho', 'Shippori Mincho', serif;
  font-size: 17px; line-height: 2.1; letter-spacing: .1em;
  color: rgba(240,228,210,.78);
  height: 100%;
  min-height: calc(100vw - 40px);
}
</style>
</head>
<body>

<div id="app">
<div id="deck"></div>

<!-- スワイプヒント -->
<div id="swipe-hint">
  <div class="hint-arrows">
    <div class="hint-arr">↑</div>
    <div class="hint-arr">↓</div>
  </div>
  <div class="hint-txt">SWIPE</div>
</div>

<!-- フィルターボタン -->
<button id="btn-filter">≡</button>

<!-- インジケーター -->
<div id="progress"></div>

<!-- アクションバー -->
<div id="action-bar">
  <div class="action-bar-inner">
    <div class="action-info">
      <div class="action-author" id="action-author"></div>
      <div class="action-title" id="action-title"></div>
    </div>
    <a class="action-btn" id="action-src" href="#" target="_blank" rel="noopener">原文</a>
    <button class="action-shelf-btn" id="btn-shelf">
      📚
      <span class="action-badge" id="shelf-badge"></span>
    </button>
  </div>
</div>

<!-- フィルタードロワー -->
<div id="filter-drawer">
  <div id="filter-backdrop"></div>
  <div id="filter-panel">
    <div class="filter-label">GENRE</div>
    <button class="f-item on" data-f="all">すべて</button>
    <button class="f-item" data-f="純文学">純文学</button>
    <button class="f-item" data-f="探偵・推理">探偵・推理</button>
    <button class="f-item" data-f="怪談・怪異">怪談・怪異</button>
    <button class="f-item" data-f="恋愛・情念">恋愛・情念</button>
    <button class="f-item" data-f="歴史・時代">歴史・時代</button>
    <button class="f-item" data-f="幻想・耽美">幻想・耽美</button>
    <button class="f-item" data-f="社会・風俗">社会・風俗</button>
  </div>
</div>

<!-- 書棚：全画面リーダー -->
<div id="shelf-drawer">
  <div id="shelf-panel">
    <!-- リストビュー -->
    <div id="shelf-list-view">
      <div class="shelf-hd">

        <button class="shelf-close" id="shelf-close">✕</button>

    <div id="shelf-reader-view">
      <div class="reader-hd">
        <button class="reader-back" id="reader-back">←</button>

          <div class="reader-title" id="reader-title"></div>
          <div class="reader-author" id="reader-author"></div>
        </div>
        <div class="reader-acts">
          <a class="reader-src" id="reader-src" target="_blank" rel="noopener">原文</a>
          <button class="reader-ret" id="reader-ret">返却</button>
        </div>
      </div>
      <div class="reader-body">
        <div class="reader-text" id="reader-text"></div>
      </div>
    </div>
  </div>
</div>

</div><!-- /#app -->

<script>
// ===== 埋め込みブックリスト (500件) =====
// ===== BOOK LIST (500件・メタデータのみ) =====
// GitHub raw から取得したbooklist_final.json相当のデータ
// 形式: {id, title, author, path}
let BOOKLIST = null;

// ===== CONSTANTS =====
const BASE_URL = 'https://raw.githubusercontent.com/aozorahack/aozorabunko_text/master/';
const AOZORA_URL = 'https://www.aozora.gr.jp/cards/';

// 青空文庫記法を除去してクリーンな本文を返す
function cleanText(raw) {
  // ヘッダー区切り（---が10文字以上）で分割
  const parts = raw.split(/\-{10,}/);
  // parts[0]=タイトル, [1]=記号説明, [2]=本文（最後は底本情報）
  let body = parts.length >= 3 ? parts[2] : parts[parts.length - 1];
  // 底本情報を除去
  body = body.split('底本：')[0];
  // 青空文庫記法除去
  body = body
    .replace(/《[^》]*》/g, '')       // ルビ
    .replace(/｜/g, '')               // ルビ開始記号
    .replace(/〔[^〕]*〕/g, '')       // 注記
    .replace(/［＃[^\]]*］/g, '')     // 入力者注
    .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .replace(/\n{3,}/g, '\n\n')       // 空行を詰める
    .trim();
  const cut = body.slice(0, 250);
  const lastKuten = cut.lastIndexOf('。');
  return lastKuten !== -1 ? cut.slice(0, lastKuten + 1) : cut;
}

// パスからaozora.gr.jpの図書カードURLを生成
function toAozoraUrl(path) {
  const m = path.match(/cards\/(\d+)\/files\/(\d+)_/);
  return m ? `${AOZORA_URL}${m[1]}/card${m[2]}.html` : '#';
}

// テキストキャッシュ
const textCache = {};

async function fetchText(path) {
  if (textCache[path]) return textCache[path];
  const url = BASE_URL + path;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const buf = await r.arrayBuffer();
  const text = new TextDecoder('shift_jis').decode(buf);
  const clean = cleanText(text);
  textCache[path] = clean;
  return clean;
}

// カードのローディング表示を更新
function setCardText(el, text) {
  const wrap = el.querySelector('.card-text');
  if (wrap) {
    wrap.textContent = text;
    wrap.classList.remove('card-loading-txt');
    wrap.style.animation = 'none';
    wrap.style.color = '';
  }
  el.classList.remove('is-loading');
}

function setCardError(el) {
  const wrap = el.querySelector('.card-text');
  if (wrap) wrap.textContent = '本文の取得に失敗しました。\n\n時間をおいて再読み込みしてください。';
  el.classList.remove('is-loading');
}

function buildCard(w, idx) {
  const el = document.createElement('div');
  el.className = 'card is-loading';
  el.dataset.idx = idx;
  el.dataset.id = w.id;
  el.dataset.path = w.path;
  // ジャンルは著者名から推定（後で動的に設定）
  el.dataset.g = '小説';

  const lent = lending.has(w.id);
  const aozoraUrl = toAozoraUrl(w.path);

  el.innerHTML = `
    <div class="card-bg"></div>
    <div class="card-accent"></div>
    <div class="card-top">
      <div class="meta-genre">
        <span class="genre-name">${w.author}</span>
        <span class="pattern-name">loading...</span>
      </div>
      <span class="meta-counter">${idx + 1} / ${list.length}</span>
    </div>
    <div class="card-text-wrap">
      <div class="card-text card-loading-txt">―　読み込み中　―</div>
    </div>
    <div class="card-bottom">
      <div class="card-divider"></div>
      <div class="card-author-row">
        <div class="author-info">
          <div class="author-name">${w.author}</div>
          <div class="work-title">『${w.title}』</div>
        </div>
        <div class="card-actions">
          <a href="${aozoraUrl}" target="_blank" rel="noopener" class="btn-src">原文</a>
          <button class="btn-lend${lent ? ' is-lent' : ''}" data-id="${w.id}">${lent ? '返却' : '借出す'}</button>
        </div>
      </div>
    </div>`;

  el.querySelector('.btn-lend').addEventListener('click', e => {
    e.stopPropagation();
    const id = e.currentTarget.dataset.id;
    if (lending.has(id)) {
      lending.delete(id);
    } else {
      lending.set(id, { title: w.title, author: w.author, path: w.path, text: textCache[w.path] || null });
    }
    const isLent = lending.has(id);
    e.currentTarget.classList.toggle('is-lent', isLent);
    e.currentTarget.textContent = isLent ? '返却' : '借出す';
    updateBadge();
  });

  return el;
}

function build() {
  deck.innerHTML = '';
  cards = [];
  list.forEach((w, i) => {
    const el = buildCard(w, i);
    if (i === 0) el.classList.add('is-current');
    deck.appendChild(el);
    cards.push(el);
  });
  cur = 0;
  updateProgress();
  updateActionBar();
  // 最初の3枚を先読み
  prefetch(0);
}

// 周辺カードをプリフェッチ
async function prefetch(idx) {
  const targets = [idx, idx + 1, idx + 2].filter(i => i >= 0 && i < list.length);
  for (const i of targets) {
    const w = list[i];
    if (textCache[w.path]) {
      // キャッシュ済みならカードに反映
      updateCardText(i);
      continue;
    }
    try {
      await fetchText(w.path);
      updateCardText(i);
    } catch(e) {
      if (cards[i]) setCardError(cards[i]);
    }
  }
}

function updateCardText(idx) {
  const w = list[idx];
  const card = cards[idx];
  if (!card || !w) return;
  const text = textCache[w.path];
  if (!text) return;
  setCardText(card, text);
  // 借出済みならテキストも更新
  if (lending.has(w.id)) {
    lending.get(w.id).text = text;
  }
  // pattern表示を更新（冒頭1文字で簡易判定）
  const first = text.charAt(0);
  const pattern = /「|『/.test(first) ? 'セリフ始まり' : /[一-龠ぁ-ん]/.test(first) ? '散文' : '書き出し';
  const pEl = card.querySelector('.pattern-name');
  if (pEl) pEl.textContent = pattern;
}

// ===== NAVIGATION =====
function goTo(next) {
  if (transitioning || next < 0 || next >= cards.length) return;
  transitioning = true;

  const prev = cards[cur];
  const nextEl = cards[next];
  const goDown = next > cur;

  prev.classList.remove('is-current');
  prev.style.transform = goDown ? 'translateY(-100vh)' : 'translateY(100vh)';
  prev.style.opacity = '0';

  nextEl.style.transition = 'none';
  nextEl.style.transform = goDown ? 'translateY(100vh)' : 'translateY(-100vh)';
  nextEl.style.opacity = '0';
  nextEl.getBoundingClientRect();
  nextEl.style.transition = '';
  nextEl.classList.add('is-current');
  nextEl.style.transform = 'translateY(0)';
  nextEl.style.opacity = '1';

  cur = next;
  updateProgress();
  updateActionBar();

  // 次の2枚をプリフェッチ
  prefetch(next + 1);

  setTimeout(() => {
    prev.classList.remove('is-current');
    prev.style.transform = '';
    prev.style.opacity = '';
    transitioning = false;
  }, 500);
}

function updateActionBar() {
  const w = list[cur];
  if (!w) return;
  const authorEl = document.getElementById('action-author');
  const titleEl = document.getElementById('action-title');
  const srcEl = document.getElementById('action-src');
  const shelfBtn = document.getElementById('btn-shelf');
  if (authorEl) authorEl.textContent = w.author;
  if (titleEl) titleEl.textContent = '『' + w.title + '』';
  if (srcEl) srcEl.href = toAozoraUrl(w.path);
  if (shelfBtn) shelfBtn.classList.toggle('has-items', lending.size > 0);
}

function updateProgress() {
  const prog = document.getElementById('progress');
  const total = Math.min(cards.length, 14);
  if (total < 2) { prog.innerHTML = ''; return; }
  prog.innerHTML = Array.from({length: total}, (_, i) => {
    const mapped = Math.round((i / (total - 1)) * (cards.length - 1));
    const on = mapped === cur || (i === total - 1 && cur === cards.length - 1);
    return `<div class="prog-dot${on ? ' on' : ''}"></div>`;
  }).join('');
}

// ===== SWIPE =====
let ty0 = 0, tx0 = 0, dragging = false, delta = 0;

deck.addEventListener('touchstart', e => {
  if (e.target.closest('button, a')) return;
  ty0 = e.touches[0].clientY;
  tx0 = e.touches[0].clientX;
  dragging = false; delta = 0;
}, {passive: true});

deck.addEventListener('touchmove', e => {
  if (e.target.closest('button, a')) return;
  const dy = e.touches[0].clientY - ty0;
  const dx = e.touches[0].clientX - tx0;
  if (!dragging) {
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 6) dragging = true;
    else if (Math.abs(dx) > 10) return;
  }
  if (!dragging) return;
  e.preventDefault();
  delta = dy;

  const card = cards[cur];
  if (!card) return;
  const atTop = card.scrollTop <= 0;
  const atBottom = card.scrollTop + card.clientHeight >= card.scrollHeight - 2;
  const canDragNext = dy < 0 && atBottom;
  const canDragPrev = dy > 0 && atTop;

  if (canDragNext || canDragPrev) {
    const resist = Math.abs(dy) > 80 ? 80 + (Math.abs(dy) - 80) * 0.2 : Math.abs(dy);
    const sign = dy > 0 ? 1 : -1;
    card.style.transition = 'none';
    card.style.transform = `translateY(${sign * resist}px)`;
  }
}, {passive: false});

deck.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  const card = cards[cur];
  if (card) { card.style.transition = ''; card.style.transform = ''; }

  const atTop = !card || card.scrollTop <= 0;
  const atBottom = !card || card.scrollTop + card.clientHeight >= card.scrollHeight - 2;

  if (delta < -55 && atBottom) goTo(cur + 1);
  else if (delta > 55 && atTop) goTo(cur - 1);
}, {passive: true});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'j') goTo(cur + 1);
  if (e.key === 'ArrowUp'   || e.key === 'k') goTo(cur - 1);
});

});

function showShelfList() {
  document.getElementById('shelf-list-view').style.display = 'flex';
  document.getElementById('shelf-reader-view').style.display = 'none';
  renderShelf();
}

async function showReader(id) {
  const item = lending.get(id);
  if (!item) return;
  document.getElementById('shelf-list-view').style.display = 'none';
  document.getElementById('shelf-reader-view').style.display = 'flex';
  document.getElementById('reader-title').textContent = `『${item.title}』`;
  document.getElementById('reader-author').textContent = item.author;
  document.getElementById('reader-src').href = toAozoraUrl(item.path);

  const textEl = document.getElementById('reader-text');
  if (item.text) {
    textEl.textContent = item.text;
  } else {
    textEl.textContent = '読み込み中…';
    try {
      const text = await fetchText(item.path);
      item.text = text;
      textEl.textContent = text;
    } catch(e) {
      textEl.textContent = '取得に失敗しました。';
    }
  }

  document.getElementById('reader-ret').onclick = () => {
    lending.delete(id);
    updateBadge();
    // カードのボタンも更新
    const card = cards.find(c => c.dataset.id === id);
    if (card) {
      const btn = card.querySelector('.btn-lend');
      if (btn) { btn.classList.remove('is-lent'); btn.textContent = '借出す'; }
    }
    showShelfList();
  };
}

function renderShelf() {
  const bd = document.getElementById('shelf-bd');
  if (!lending.size) {
    bd.innerHTML = '<div class="shelf-empty">まだ何も借り出していません<br><br>気になった冒頭を「借出す」と<br>ここでいつでも読み返せます</div>';
    return;
  }
  bd.innerHTML = [...lending.entries()].map(([id, item]) =>
    `<div class="s-item" data-id="${id}">
      <div class="s-info">
        <div class="s-ttl">『${item.title}』</div>
        <div class="s-auth">${item.author}</div>
      </div>
      <span class="s-arrow">›</span>
    </div>`
  ).join('');
  bd.querySelectorAll('.s-item').forEach(el => {
    el.addEventListener('click', () => showReader(el.dataset.id));
  });
}

/* ==============================
   ACTION BAR（下部固定UI）
============================== */
#action-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 300;
  background: linear-gradient(to top, rgba(5,5,5,.92) 0%, rgba(5,5,5,.5) 70%, transparent 100%);
  pointer-events: none;
}
.action-bar-inner {
  display: flex;
  align-items: center;
  padding: 12px 16px 24px;
  gap: 10px;
  pointer-events: all;
}
.action-info {
  flex: 1;
  min-width: 0;
}
.action-author {
  font-size: 14px;
  font-weight: 700;
  color: rgba(240,228,210,.8);
  letter-spacing: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.action-title {
  font-size: 11px;
  color: rgba(240,228,210,.35);
  letter-spacing: 1px;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.action-btn {
  flex-shrink: 0;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.6);
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  padding: 8px 14px;
  cursor: pointer;
  letter-spacing: 1px;
  touch-action: manipulation;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  transition: all .2s;
}
.action-btn:active { background: rgba(255,255,255,.14); }
.action-shelf-btn {
  flex-shrink: 0;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.6);
  font-size: 22px;
  width: 48px; height: 48px;
  cursor: pointer;
  touch-action: manipulation;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: all .2s;
}
.action-shelf-btn.has-items {
  border-color: rgba(196,98,26,.6);
  color: rgba(240,160,74,.9);
}
.action-badge {
  position: absolute;
  top: -2px; right: -2px;
  min-width: 17px; height: 17px;
  background: #c4621a;
  border-radius: 9px;
  font-size: 9px;
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
  padding: 0 3px;
}

style.textContent = '.is-loading .card-text{color:rgba(255,255,255,.15)!important;font-style:italic}' +
  '@keyframes shimmer{0%,100%{opacity:.15}50%{opacity:.3}}' +
  '.card-loading-txt{animation:shimmer 1.5s ease infinite}';
document.head.appendChild(style);

// 起動
init();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>冒頭収集館</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Zen+Old+Mincho:wght@400;700;900&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --dur: .48s;
  --ease: cubic-bezier(.76,0,.24,1);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #050505;
  font-family: 'Shippori Mincho', serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* PC：中央に固定幅で表示 */
#app {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  /* PC時に左右に微かな影でスマホ感を演出 */
  box-shadow: 0 0 80px rgba(0,0,0,.8);
}

/* PC背景：グリッド模様で奥行き感 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ==============================
   DECK: カードスタック
============================== */
#deck {
  position: absolute;
  inset: 0;
}

/* ==============================
   CARD
============================== */
.card {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  will-change: transform, opacity;
  transform: translateY(100vh);
  transition: transform var(--dur) var(--ease), opacity var(--dur) ease;
  opacity: 0;
  /* カード内の縦スクロールを許可 */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card.is-current {
  transform: translateY(0);
  opacity: 1;
}

.card.is-above {
  transform: translateY(-100vh);
  opacity: 0;
}

.card.is-drag {
  transition: none;
}

/* ==============================
   CARD BG — ジャンルごとの世界観
============================== */
.card-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* ジャンル別カラースキーム */
.card[data-g="純文学"] .card-bg {
  background: linear-gradient(160deg, #1a1614 0%, #2d2118 40%, #1a1614 100%);
}
.card[data-g="探偵・推理"] .card-bg {
  background: linear-gradient(160deg, #0d1520 0%, #102035 40%, #0d1520 100%);
}
.card[data-g="怪談・怪異"] .card-bg {
  background: linear-gradient(160deg, #120d1a 0%, #1e1228 40%, #120d1a 100%);
}
.card[data-g="恋愛・情念"] .card-bg {
  background: linear-gradient(160deg, #1a0d10 0%, #2a1018 40%, #1a0d10 100%);
}
.card[data-g="歴史・時代"] .card-bg {
  background: linear-gradient(160deg, #160f08 0%, #261808 40%, #160f08 100%);
}
.card[data-g="幻想・耽美"] .card-bg {
  background: linear-gradient(160deg, #0d1a14 0%, #102614 40%, #0d1a14 100%);
}
.card[data-g="社会・風俗"] .card-bg {
  background: linear-gradient(160deg, #101614 0%, #152018 40%, #101614 100%);
}

/* ノイズ感 */
.card-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: .5;
  pointer-events: none;
}

/* ==============================
   GENRE ACCENT LINE
============================== */
.card-accent {
  position: absolute;
  left: 0; right: 0; top: 0;
  height: 2px;
  z-index: 10;
}
.card[data-g="純文学"]    .card-accent { background: linear-gradient(90deg, #c4621a, #e8a04a, transparent); }
.card[data-g="探偵・推理"] .card-accent { background: linear-gradient(90deg, #2a6090, #4a9cc8, transparent); }
.card[data-g="怪談・怪異"] .card-accent { background: linear-gradient(90deg, #6a2090, #a050d0, transparent); }
.card[data-g="恋愛・情念"] .card-accent { background: linear-gradient(90deg, #902040, #d04070, transparent); }
.card[data-g="歴史・時代"] .card-accent { background: linear-gradient(90deg, #8a5010, #c88030, transparent); }
.card[data-g="幻想・耽美"] .card-accent { background: linear-gradient(90deg, #1a7a40, #30b060, transparent); }
.card[data-g="社会・風俗"] .card-accent { background: linear-gradient(90deg, #2a6a40, #40a060, transparent); }

/* ==============================
   TOP META
============================== */
.card-top {
  position: relative; z-index: 10;
  padding: 52px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}

.meta-genre {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.genre-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  opacity: .45;
}
.card[data-g="純文学"]    .genre-name { color: #e8a04a; }
.card[data-g="探偵・推理"] .genre-name { color: #4a9cc8; }
.card[data-g="怪談・怪異"] .genre-name { color: #a050d0; }
.card[data-g="恋愛・情念"] .genre-name { color: #d04070; }
.card[data-g="歴史・時代"] .genre-name { color: #c88030; }
.card[data-g="幻想・耽美"] .genre-name { color: #30b060; }
.card[data-g="社会・風俗"] .genre-name { color: #40a060; }

.pattern-name {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,.2);
}

.meta-counter {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  color: rgba(255,255,255,.18);
  letter-spacing: 1px;
}

/* ==============================
   MAIN TEXT AREA
============================== */
.card-text-wrap {
  flex: 1;
  position: relative;
  z-index: 5;
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 24px 20px 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card-text {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-family: 'Zen Old Mincho', 'Shippori Mincho', serif;
  font-size: clamp(17px, 4.5vw, 22px);
  line-height: 2.1;
  letter-spacing: .12em;
  color: rgba(240, 228, 210, .88);
  /* 全文表示 */
  height: auto;
  overflow: visible;
}

/* ==============================
   BOTTOM INFO
============================== */
.card-bottom {
  position: relative; z-index: 10;
  padding: 0 28px 40px;
  flex-shrink: 0;
}

.card-divider {
  height: 1px;
  margin-bottom: 16px;
  opacity: .12;
}
.card[data-g="純文学"]    .card-divider { background: linear-gradient(90deg, #e8a04a, transparent); }
.card[data-g="探偵・推理"] .card-divider { background: linear-gradient(90deg, #4a9cc8, transparent); }
.card[data-g="怪談・怪異"] .card-divider { background: linear-gradient(90deg, #a050d0, transparent); }
.card[data-g="恋愛・情念"] .card-divider { background: linear-gradient(90deg, #d04070, transparent); }
.card[data-g="歴史・時代"] .card-divider { background: linear-gradient(90deg, #c88030, transparent); }
.card[data-g="幻想・耽美"] .card-divider { background: linear-gradient(90deg, #30b060, transparent); }
.card[data-g="社会・風俗"] .card-divider { background: linear-gradient(90deg, #40a060, transparent); }

.card-author-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 12px;
}

.author-info { flex: 1; min-width: 0; }
.author-name {
  font-size: 16px;
  font-weight: 700;
  color: rgba(240,228,210,.82);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.work-title {
  font-size: 11px;
  color: rgba(240,228,210,.3);
  letter-spacing: 1px;
}

.card-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.btn-src {
  background: none;
  border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.3);
  font-family: 'Shippori Mincho', serif;
  font-size: 10px;
  padding: 6px 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: all .2s;
  letter-spacing: 1px;
}
.btn-src:active { background: rgba(255,255,255,.06); color: rgba(255,255,255,.6); }

.btn-lend {
  background: none;
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.4);
  font-family: 'Shippori Mincho', serif;
  font-size: 11px;
  padding: 7px 16px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 1px;
}
.btn-lend:active { background: rgba(255,255,255,.08); }
.btn-lend.is-lent {
  background: rgba(200,100,40,.15);
  border-color: rgba(200,120,40,.5);
  color: #e8a04a;
}

/* ==============================
   SWIPE HINT
============================== */
#swipe-hint {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  pointer-events: none;
  animation: hintOut 1s ease 2.5s forwards;
}
.hint-arrows {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  animation: hintBounce 1s ease infinite;
}

<script>
// ===== 埋め込みブックリスト (500件) =====
// ===== BOOK LIST (500件・メタデータのみ) =====
// GitHub raw から取得したbooklist_final.json相当のデータ
// 形式: {id, title, author, path}
let BOOKLIST = null;

// ===== CONSTANTS =====
const BASE_URL = 'https://raw.githubusercontent.com/aozorahack/aozorabunko_text/master/';
const AOZORA_URL = 'https://www.aozora.gr.jp/cards/';

// 青空文庫記法を除去してクリーンな本文を返す
function cleanText(raw) {
  // ヘッダー区切り（---が10文字以上）で分割
  const parts = raw.split(/\-{10,}/);
  // parts[0]=タイトル, [1]=記号説明, [2]=本文（最後は底本情報）
  let body = parts.length >= 3 ? parts[2] : parts[parts.length - 1];
  // 底本情報を除去
  body = body.split('底本：')[0];
  // 青空文庫記法除去
  body = body
    .replace(/《[^》]*》/g, '')       // ルビ
    .replace(/｜/g, '')               // ルビ開始記号
    .replace(/〔[^〕]*〕/g, '')       // 注記
    .replace(/［＃[^\]]*］/g, '')     // 入力者注
    .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .replace(/\n{3,}/g, '\n\n')       // 空行を詰める
    .trim();
  const cut = body.slice(0, 350);
  const lastKuten = cut.lastIndexOf('。');
  return lastKuten !== -1 ? cut.slice(0, lastKuten + 1) : cut;
}

// パスからaozora.gr.jpの図書カードURLを生成
function toAozoraUrl(path) {
  // cards/000879/files/127_ruby_150/127_ruby_150.txt
  const m = path.match(/cards\/(\d+)\//);
  return m ? `${AOZORA_URL}${m[1]}/` : '#';
}

// テキストキャッシュ
const textCache = {};

async function fetchText(path) {
  if (textCache[path]) return textCache[path];
  const url = BASE_URL + path;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const buf = await r.arrayBuffer();
  const text = new TextDecoder('shift_jis').decode(buf);
  const clean = cleanText(text);
  textCache[path] = clean;
  return clean;
}

// ===== STATE =====
let list = [];
let cur = 0;
let lending = new Map(); // id → {title, author, path, text}
let transitioning = false;
let filterVal = 'all';

// ===== DECK =====
const deck = document.getElementById('deck');
let cards = [];

// カードのローディング表示を更新
function setCardText(el, text) {
  const wrap = el.querySelector('.card-text');
  if (wrap) {
    wrap.textContent = text;
    wrap.classList.remove('card-loading-txt');
    wrap.style.animation = 'none';
    wrap.style.color = '';
  }
  el.classList.remove('is-loading');
}

function setCardError(el) {
  const wrap = el.querySelector('.card-text');
  if (wrap) wrap.textContent = '本文の取得に失敗しました。\n\n時間をおいて再読み込みしてください。';
  el.classList.remove('is-loading');
}

function buildCard(w, idx) {
  const el = document.createElement('div');
  el.className = 'card is-loading';
  el.dataset.idx = idx;
  el.dataset.id = w.id;
  el.dataset.path = w.path;
  // ジャンルは著者名から推定（後で動的に設定）
  el.dataset.g = '小説';

  const lent = lending.has(w.id);
  const aozoraUrl = toAozoraUrl(w.path);

  el.innerHTML = `
    <div class="card-bg"></div>
    <div class="card-accent"></div>
    <div class="card-top">
      <div class="meta-genre">
        <span class="genre-name">${w.author}</span>
        <span class="pattern-name">loading...</span>
      </div>
      <span class="meta-counter">${idx + 1} / ${list.length}</span>
    </div>
    <div class="card-text-wrap">
      <div class="card-text card-loading-txt">―　読み込み中　―</div>
    </div>
    <div class="card-bottom">
      <div class="card-divider"></div>
      <div class="card-author-row">
        <div class="author-info">
          <div class="author-name">${w.author}</div>
          <div class="work-title">『${w.title}』</div>
        </div>
        <div class="card-actions">
          <a href="${aozoraUrl}" target="_blank" rel="noopener" class="btn-src">原文</a>
          <button class="btn-lend${lent ? ' is-lent' : ''}" data-id="${w.id}">${lent ? '返却' : '借出す'}</button>
        </div>
      </div>
    </div>`;

  el.querySelector('.btn-lend').addEventListener('click', e => {
    e.stopPropagation();
    const id = e.currentTarget.dataset.id;
    if (lending.has(id)) {
      lending.delete(id);
    } else {
      lending.set(id, { title: w.title, author: w.author, path: w.path, text: textCache[w.path] || null });
    }
    const isLent = lending.has(id);
    e.currentTarget.classList.toggle('is-lent', isLent);
    e.currentTarget.textContent = isLent ? '返却' : '借出す';
    updateBadge();
  });

  return el;
}

function build() {
  deck.innerHTML = '';
  cards = [];
  list.forEach((w, i) => {
    const el = buildCard(w, i);
    if (i === 0) el.classList.add('is-current');
    deck.appendChild(el);
    cards.push(el);
  });
  cur = 0;
  updateProgress();
  // 最初の3枚を先読み
  prefetch(0);
}

// 周辺カードをプリフェッチ
async function prefetch(idx) {
  const targets = [idx, idx + 1, idx + 2].filter(i => i >= 0 && i < list.length);
  for (const i of targets) {
    const w = list[i];
    if (textCache[w.path]) {
      // キャッシュ済みならカードに反映
      updateCardText(i);
      continue;
    }
    try {
      await fetchText(w.path);
      updateCardText(i);
    } catch(e) {
      if (cards[i]) setCardError(cards[i]);
    }
  }
}

function updateCardText(idx) {
  const w = list[idx];
  const card = cards[idx];
  if (!card || !w) return;
  const text = textCache[w.path];
  if (!text) return;
  setCardText(card, text);
  // 借出済みならテキストも更新
  if (lending.has(w.id)) {
    lending.get(w.id).text = text;
  }
  // pattern表示を更新（冒頭1文字で簡易判定）
  const first = text.charAt(0);
  const pattern = /「|『/.test(first) ? 'セリフ始まり' : /[一-龠ぁ-ん]/.test(first) ? '散文' : '書き出し';
  const pEl = card.querySelector('.pattern-name');
  if (pEl) pEl.textContent = pattern;
}

// ===== NAVIGATION =====
function goTo(next) {
  if (transitioning || next < 0 || next >= cards.length) return;
  transitioning = true;

  const prev = cards[cur];
  const nextEl = cards[next];
  const goDown = next > cur;

  prev.classList.remove('is-current');
  prev.style.transform = goDown ? 'translateY(-100vh)' : 'translateY(100vh)';
  prev.style.opacity = '0';

  nextEl.style.transition = 'none';
  nextEl.style.transform = goDown ? 'translateY(100vh)' : 'translateY(-100vh)';
  nextEl.style.opacity = '0';
  nextEl.getBoundingClientRect();
  nextEl.style.transition = '';
  nextEl.classList.add('is-current');
  nextEl.style.transform = 'translateY(0)';
  nextEl.style.opacity = '1';

  cur = next;
  updateProgress();

  // 次の2枚をプリフェッチ
  prefetch(next + 1);

  setTimeout(() => {
    prev.classList.remove('is-current');
    prev.style.transform = '';
    prev.style.opacity = '';
    transitioning = false;
  }, 500);
}

function updateProgress() {
  const prog = document.getElementById('progress');
  const total = Math.min(cards.length, 14);
  if (total < 2) { prog.innerHTML = ''; return; }
  prog.innerHTML = Array.from({length: total}, (_, i) => {
    const mapped = Math.round((i / (total - 1)) * (cards.length - 1));
    const on = mapped === cur || (i === total - 1 && cur === cards.length - 1);
    return `<div class="prog-dot${on ? ' on' : ''}"></div>`;
  }).join('');
}

// ===== SWIPE =====
let ty0 = 0, tx0 = 0, dragging = false, delta = 0;

deck.addEventListener('touchstart', e => {
  if (e.target.closest('button, a')) return;
  ty0 = e.touches[0].clientY;
  tx0 = e.touches[0].clientX;
  dragging = false; delta = 0;
}, {passive: true});

deck.addEventListener('touchmove', e => {
  if (e.target.closest('button, a')) return;
  const dy = e.touches[0].clientY - ty0;
  const dx = e.touches[0].clientX - tx0;
  if (!dragging) {
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 6) dragging = true;
    else if (Math.abs(dx) > 10) return;
  }
  if (!dragging) return;
  e.preventDefault();
  delta = dy;

  const card = cards[cur];
  if (!card) return;
  const atTop = card.scrollTop <= 0;
  const atBottom = card.scrollTop + card.clientHeight >= card.scrollHeight - 2;
  const canDragNext = dy < 0 && atBottom;
  const canDragPrev = dy > 0 && atTop;

  if (canDragNext || canDragPrev) {
    const resist = Math.abs(dy) > 80 ? 80 + (Math.abs(dy) - 80) * 0.2 : Math.abs(dy);
    const sign = dy > 0 ? 1 : -1;
    card.style.transition = 'none';
    card.style.transform = `translateY(${sign * resist}px)`;
  }
}, {passive: false});

deck.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  const card = cards[cur];
  if (card) { card.style.transition = ''; card.style.transform = ''; }

  const atTop = !card || card.scrollTop <= 0;
  const atBottom = !card || card.scrollTop + card.clientHeight >= card.scrollHeight - 2;

  if (delta < -55 && atBottom) goTo(cur + 1);
  else if (delta > 55 && atTop) goTo(cur - 1);
}, {passive: true});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'j') goTo(cur + 1);
  if (e.key === 'ArrowUp'   || e.key === 'k') goTo(cur - 1);
});

// ===== FILTER =====
const filterDrawer = document.getElementById('filter-drawer');
document.getElementById('btn-filter').addEventListener('click', () => {
  filterDrawer.classList.toggle('open');
});
document.getElementById('filter-backdrop').addEventListener('click', () => {
  filterDrawer.classList.remove('open');
});
document.querySelectorAll('.f-item').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.f-item').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    filterVal = b.dataset.f;
    applyFilter();
    filterDrawer.classList.remove('open');
  });
});

function applyFilter() {
  if (!BOOKLIST) return;
  // 著者名フィルター（シンプルに著者名で絞る）
  const AUTHOR_GENRE = {
    '夏目漱石': '純文学', '芥川竜之介': '純文学', '太宰治': '純文学',
    '森鴎外': '純文学', '志賀直哉': '純文学', '有島武郎': '純文学',
    '国木田独歩': '純文学', '島崎藤村': '純文学', '田山花袋': '純文学',
    '永井荷風': '純文学', '谷崎潤一郎': '純文学', '川端康成': '純文学',
    '梶井基次郎': '純文学', '横光利一': '純文学', '葛西善蔵': '純文学',
    '坂口安吾': '純文学', '織田作之助': '純文学', '岡本かの子': '純文学',

// ===== SHELF =====
function updateBadge() {
  const n = lending.size;
  const b = document.getElementById('shelf-badge');
  b.style.display = n > 0 ? 'flex' : 'none';
  b.textContent = n;
}

document.getElementById('btn-shelf').addEventListener('click', () => {
  document.getElementById('shelf-drawer').classList.add('open');
  showShelfList();
});
document.getElementById('shelf-close').addEventListener('click', () => {
  document.getElementById('shelf-drawer').classList.remove('open');
});
document.getElementById('reader-back').addEventListener('click', showShelfList);

function showShelfList() {
  document.getElementById('shelf-list-view').style.display = 'flex';
  document.getElementById('shelf-reader-view').style.display = 'none';
  renderShelf();
}

async function showReader(id) {
  const item = lending.get(id);
  if (!item) return;
  document.getElementById('shelf-list-view').style.display = 'none';
  document.getElementById('shelf-reader-view').style.display = 'flex';
  document.getElementById('reader-title').textContent = `『${item.title}』`;
  document.getElementById('reader-author').textContent = item.author;
  document.getElementById('reader-src').href = toAozoraUrl(item.path);

  const textEl = document.getElementById('reader-text');
  if (item.text) {
    textEl.textContent = item.text;
  } else {
    textEl.textContent = '読み込み中…';
    try {
      const text = await fetchText(item.path);
      item.text = text;
      textEl.textContent = text;
    } catch(e) {
      textEl.textContent = '取得に失敗しました。';
    }
  }

  document.getElementById('reader-ret').onclick = () => {
    lending.delete(id);
    updateBadge();
    // カードのボタンも更新
    const card = cards.find(c => c.dataset.id === id);
    if (card) {
      const btn = card.querySelector('.btn-lend');
      if (btn) { btn.classList.remove('is-lent'); btn.textContent = '借出す'; }
    }
    showShelfList();
  };
}

function renderShelf() {
  const bd = document.getElementById('shelf-bd');
  if (!lending.size) {
    bd.innerHTML = '<div class="shelf-empty">まだ何も借り出していません<br><br>気になった冒頭を「借出す」と<br>ここでいつでも読み返せます</div>';
    return;
  }
  bd.innerHTML = [...lending.entries()].map(([id, item]) =>
    `<div class="s-item" data-id="${id}">
      <div class="s-info">
        <div class="s-ttl">『${item.title}』</div>
        <div class="s-auth">${item.author}</div>
      </div>
      <span class="s-arrow">›</span>
    </div>`
  ).join('');
  bd.querySelectorAll('.s-item').forEach(el => {
    el.addEventListener('click', () => showReader(el.dataset.id));
  });
}
