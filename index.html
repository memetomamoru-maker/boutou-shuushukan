<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>冒頭収集館</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700;800&family=Zen+Old+Mincho:wght@400;700;900&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<link rel="apple-touch-icon" href="./icon-512.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--dur:.48s;--ease:cubic-bezier(.76,0,.24,1);}

html,body{
  width:100%;height:100%;overflow:hidden;
  background:#050505;font-family:'Shippori Mincho',serif;
  user-select:none;-webkit-user-select:none;
  overscroll-behavior-x:none;
}

/* 背景 */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}

@media (min-width: 768px){
  body::before{
    background:
      linear-gradient(rgba(0,0,0,.38), rgba(0,0,0,.38)),
      url('./bg-silhouette.png') center center / cover no-repeat;
  }

  /* PCでは背景画像を見せるため、動くグラデをかなり薄くする */
  #grad-bg,
  #grad-bg.active{
    opacity:.16 !important;
  }

  #bg-overlay,
  #bg-overlay.active{
    opacity:.22;
  }
}

#app{
  position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;box-shadow:0 0 80px rgba(0,0,0,.8);
  overflow:hidden;
}

/* 墨滲みレイヤー削除済み */

/* ===== DECK ===== */
#deck{position:absolute;inset:0;touch-action:none;overscroll-behavior-x:none;z-index:2;}

/* ===== CARD ===== */
.card{
  position:absolute;inset:0;display:flex;flex-direction:column;
  will-change:transform,opacity;
  transform:translateY(100vh);
  transition:transform var(--dur) var(--ease),opacity var(--dur) ease;
  opacity:0;overflow:hidden;touch-action:none;
}
.card.is-current{transform:translateY(0);opacity:1;}
.card.is-above  {transform:translateY(-100vh);opacity:0;}
.card.is-drag   {transition:none;}

.card-bg{position:absolute;inset:0;z-index:0;}
.card[data-g="純文学"]    .card-bg{background:linear-gradient(160deg,#1a1614 0%,#2d2118 40%,#1a1614 100%);}
.card[data-g="探偵・推理"] .card-bg{background:linear-gradient(160deg,#0d1520 0%,#102035 40%,#0d1520 100%);}
.card[data-g="怪談・怪異"] .card-bg{background:linear-gradient(160deg,#120d1a 0%,#1e1228 40%,#120d1a 100%);}
.card[data-g="恋愛・情念"] .card-bg{background:linear-gradient(160deg,#1a0d10 0%,#2a1018 40%,#1a0d10 100%);}
.card[data-g="歴史・時代"] .card-bg{background:linear-gradient(160deg,#160f08 0%,#261808 40%,#160f08 100%);}
.card[data-g="幻想・耽美"] .card-bg{background:linear-gradient(160deg,#0d1a14 0%,#102614 40%,#0d1a14 100%);}
.card[data-g="社会・風俗"] .card-bg{background:linear-gradient(160deg,#101614 0%,#152018 40%,#101614 100%);}

.card-bg::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px;opacity:.5;pointer-events:none;
}

.card-accent{position:absolute;left:0;right:0;top:0;height:2px;z-index:10;}
.card[data-g="純文学"]    .card-accent{background:linear-gradient(90deg,#c4621a,#e8a04a,transparent);}
.card[data-g="探偵・推理"] .card-accent{background:linear-gradient(90deg,#2a6090,#4a9cc8,transparent);}
.card[data-g="怪談・怪異"] .card-accent{background:linear-gradient(90deg,#6a2090,#a050d0,transparent);}
.card[data-g="恋愛・情念"] .card-accent{background:linear-gradient(90deg,#902040,#d04070,transparent);}
.card[data-g="歴史・時代"] .card-accent{background:linear-gradient(90deg,#8a5010,#c88030,transparent);}
.card[data-g="幻想・耽美"] .card-accent{background:linear-gradient(90deg,#1a7a40,#30b060,transparent);}
.card[data-g="社会・風俗"] .card-accent{background:linear-gradient(90deg,#2a6a40,#40a060,transparent);}

/* TOP META */
.card-top{position:relative;z-index:10;padding:16px 20px 0;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.genre-badge{
  font-size:11px;font-weight:700;letter-spacing:2px;
  padding:3px 10px;border:1px solid currentColor;opacity:.85;
}
.card[data-g="純文学"]    .genre-badge{color:#e8a04a;}
.card[data-g="探偵・推理"] .genre-badge{color:#4a9cc8;}
.card[data-g="怪談・怪異"] .genre-badge{color:#a050d0;}
.card[data-g="恋愛・情念"] .genre-badge{color:#d04070;}
.card[data-g="歴史・時代"] .genre-badge{color:#c88030;}
.card[data-g="幻想・耽美"] .genre-badge{color:#30b060;}
.card[data-g="社会・風俗"] .genre-badge{color:#40a060;}
.pattern-name{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.28);}

/* TEXT AREA */
.card-text-wrap{
  flex:1;position:relative;z-index:5;
  display:flex;align-items:flex-start;justify-content:flex-end;
  padding:20px 24px 90px; /* 下90px = actionbar分 */
  overflow:hidden;
}
@keyframes textDrift{0%,100%{opacity:.92;}50%{opacity:1;}}
.card.is-current .card-text-wrap{animation:textDrift 4s ease-in-out infinite;}
.card.is-current.swiping-active .card-text-wrap{animation:none;}

.card-text{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:'Zen Old Mincho','Shippori Mincho',serif;
  font-size:clamp(17px,4.5vw,22px);line-height:2.1;letter-spacing:.15em;
  color:rgba(240,228,210,.88);height:auto;overflow:visible;
}

/* ===== ACTION BAR ===== */
#action-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:400;
  background:linear-gradient(to top,rgba(5,5,5,.97) 0%,rgba(5,5,5,.7) 60%,transparent 100%);
  pointer-events:none;
}
.action-bar-inner{
  display:flex;align-items:center;
  padding:8px 14px 16px;gap:8px;pointer-events:all;
}
.action-info{flex:1;min-width:0;}
.action-author{font-size:14px;font-weight:700;color:rgba(240,228,210,.9);letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.action-title{font-size:10px;color:rgba(240,228,210,.35);letter-spacing:1px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.action-btns{display:flex;align-items:center;gap:6px;flex-shrink:0;}

.action-btn{
  flex-shrink:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);font-family:'Shippori Mincho',serif;
  font-size:10px;padding:7px 12px;cursor:pointer;letter-spacing:1px;
  touch-action:manipulation;text-decoration:none;
  display:inline-flex;align-items:center;white-space:nowrap;
  transition:background .2s;-webkit-tap-highlight-color:transparent;
}
.action-btn:active{background:rgba(255,255,255,.16);}

.action-icon-btn{
  flex-shrink:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.6);font-size:16px;
  width:38px;height:38px;min-width:38px;
  cursor:pointer;touch-action:manipulation;border-radius:50%;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:background .2s;-webkit-tap-highlight-color:transparent;
}
.action-icon-btn:active{background:rgba(255,255,255,.16);}
#btn-shelf.has-items{border-color:rgba(196,98,26,.6);color:rgba(240,160,74,.9);}

/* 書棚バウンス */
@keyframes shelfBounce{0%{transform:scale(1)}25%{transform:scale(1.55)}50%{transform:scale(0.85)}75%{transform:scale(1.2)}100%{transform:scale(1)}}
#btn-shelf.bounce{animation:shelfBounce .5s ease forwards;}

/* 保存済みフラッシュ */
@keyframes savedFlash{0%{opacity:0;transform:translateY(-4px)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(-12px)}}
#saved-toast{
  position:absolute;bottom:70px;right:14px;z-index:500;
  font-size:10px;letter-spacing:2px;color:rgba(240,160,74,.9);
  pointer-events:none;opacity:0;
}
#saved-toast.show{animation:savedFlash 1.4s ease forwards;}

.action-badge{
  position:absolute;top:-3px;right:-3px;
  min-width:16px;height:16px;background:#c4621a;border-radius:8px;
  font-size:9px;color:#fff;display:none;
  align-items:center;justify-content:center;font-family:sans-serif;padding:0 3px;
}

/* ===== HEADER ===== */
#header-ui{position:absolute;top:0;right:0;z-index:300;display:flex;align-items:center;gap:6px;padding:14px 14px 0;}
#btn-filter,#btn-guide{
  width:36px;height:36px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  border-radius:50%;color:rgba(255,255,255,.55);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;touch-action:manipulation;
}
#btn-filter:active,#btn-guide:active{background:rgba(255,255,255,.12);}

#card-counter{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  z-index:300;pointer-events:none;
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1px;white-space:nowrap;
}

/* プログレスドット */
#progress{position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.prog-dot{width:2px;height:2px;border-radius:1px;background:rgba(255,255,255,.18);transition:all .3s;}
.prog-dot.on{height:18px;background:rgba(255,255,255,.45);}

/* スワイプインジケーター */
#swipe-indicator{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;opacity:0;animation:swipeIndAnim 3s ease 1.5s 1 forwards;}
@keyframes swipeIndAnim{0%{opacity:0;transform:translateX(-50%) translateY(0)}20%{opacity:.7}75%{opacity:.7;transform:translateX(-50%) translateY(-14px)}100%{opacity:0;transform:translateX(-50%) translateY(-22px)}}
.swipe-ind-line{width:1px;height:28px;background:linear-gradient(to top,rgba(240,228,210,.6),transparent);}
.swipe-ind-text{font-size:8px;letter-spacing:3px;color:rgba(240,228,210,.4);}


/* ===== グラデーション背景アニメーション ===== */
#grad-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.2s ease;
  /* 大きめのグラデを動かしてローリング感を出す */
  background-size: 400% 400%;
  animation: gradFlow 12s ease infinite;
}
#grad-bg.active { opacity: 1; }

@keyframes gradFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* スワイプ中はアニメーションを速く */
#grad-bg.swiping {
  animation-duration: 3s;
  opacity: 0.85;
}

/* ジャンル別グラデーション */
body[data-genre="純文学"]    #grad-bg { background-image: linear-gradient(135deg, #0a0806 0%, #2d1a08 25%, #1a0e04 50%, #261408 75%, #0a0806 100%); }
body[data-genre="探偵・推理"] #grad-bg { background-image: linear-gradient(135deg, #050a14 0%, #0a1a2e 25%, #061020 50%, #0d2038 75%, #050a14 100%); }
body[data-genre="怪談・怪異"] #grad-bg { background-image: linear-gradient(135deg, #080514 0%, #18082a 25%, #0e0618 50%, #1e0a30 75%, #080514 100%); }
body[data-genre="恋愛・情念"] #grad-bg { background-image: linear-gradient(135deg, #0e0408 0%, #28081a 25%, #180610 50%, #220a14 75%, #0e0408 100%); }
body[data-genre="歴史・時代"] #grad-bg { background-image: linear-gradient(135deg, #0a0604 0%, #241408 25%, #160a04 50%, #1e1006 75%, #0a0604 100%); }
body[data-genre="幻想・耽美"] #grad-bg { background-image: linear-gradient(135deg, #040e08 0%, #082010 25%, #061408 50%, #0a2412 75%, #040e08 100%); }
body[data-genre="社会・風俗"] #grad-bg { background-image: linear-gradient(135deg, #040e08 0%, #0a1e10 25%, #060e08 50%, #0c1c10 75%, #040e08 100%); }

/* bg-overlay */
#bg-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .5s,background .4s;}
#bg-overlay.active{opacity:1;}
body[data-genre="純文学"]    #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(196,98,26,.35) 0%,transparent 65%);}
body[data-genre="探偵・推理"] #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(42,96,160,.35) 0%,transparent 65%);}
body[data-genre="怪談・怪異"] #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(120,32,160,.35) 0%,transparent 65%);}
body[data-genre="恋愛・情念"] #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(160,32,64,.35) 0%,transparent 65%);}
body[data-genre="歴史・時代"] #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(140,80,16,.35) 0%,transparent 65%);}
body[data-genre="幻想・耽美"] #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(26,130,64,.35) 0%,transparent 65%);}
body[data-genre="社会・風俗"] #bg-overlay{background:radial-gradient(ellipse at 50% 110%,rgba(42,110,64,.35) 0%,transparent 65%);}

/* ===== FILTER DRAWER ===== */
#filter-drawer{position:absolute;inset:0;z-index:500;pointer-events:none;}
#filter-drawer.open{pointer-events:all;}
#filter-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .3s;}
#filter-drawer.open #filter-backdrop{opacity:1;}
#filter-panel{
  position:absolute;top:0;right:0;bottom:0;width:min(280px,80vw);
  background:#111;border-left:1px solid rgba(255,255,255,.07);
  padding:60px 24px 40px;transform:translateX(100%);visibility:hidden;
  transition:transform .35s var(--ease);display:flex;flex-direction:column;gap:8px;overflow-y:auto;
}
#filter-drawer.open #filter-panel{transform:translateX(0);visibility:visible;}
.filter-label{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:10px;}
.f-item{
  background:none;border:none;border-bottom:1px solid rgba(255,255,255,.05);
  color:rgba(255,255,255,.35);font-family:'Shippori Mincho',serif;
  font-size:14px;padding:12px 0;cursor:pointer;text-align:left;
  letter-spacing:2px;transition:color .18s;touch-action:manipulation;
}
.f-item:active,.f-item.on{color:rgba(255,255,255,.85);}
.f-item.on::before{content:'— ';color:rgba(255,255,255,.3);}
.filter-note-link{margin-top:auto;padding-top:24px;border-top:1px solid rgba(255,255,255,.05);text-decoration:none;display:block;}
.filter-note-inner{font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.22);line-height:2;}
.filter-note-inner span{display:block;font-size:13px;color:rgba(255,255,255,.4);margin:2px 0;}

/* ===== SHELF DRAWER ===== */
#shelf-drawer{position:absolute;inset:0;z-index:500;pointer-events:none;}
#shelf-drawer.open{pointer-events:all;}
#shelf-panel{
  position:absolute;inset:0;background:#0d0d0d;
  transform:translateY(100%);transition:transform .4s var(--ease);
  display:flex;flex-direction:column;overflow:hidden;
}
#shelf-drawer.open #shelf-panel{transform:translateY(0);}
.shelf-hd{padding:52px 24px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.shelf-ttl{font-size:13px;letter-spacing:3px;color:rgba(255,255,255,.4);}
.shelf-close{background:none;border:none;color:rgba(255,255,255,.25);font-size:18px;cursor:pointer;touch-action:manipulation;padding:4px;}
#shelf-list-view,#shelf-reader-view{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#shelf-reader-view{display:none;}
.shelf-bd{overflow-y:auto;padding:8px 24px 40px;flex:1;}
.shelf-empty{text-align:center;color:rgba(255,255,255,.2);font-size:13px;letter-spacing:1px;padding:52px 0;line-height:2.8;}
.s-item{padding:16px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:14px;cursor:pointer;}
.s-item:active{background:rgba(255,255,255,.02);}
.s-info{flex:1;min-width:0;}
.s-ttl{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:4px;letter-spacing:1px;}
.s-auth{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.s-arrow{color:rgba(255,255,255,.15);font-size:14px;flex-shrink:0;}
.reader-hd{padding:16px 24px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.reader-back{background:none;border:none;color:rgba(255,255,255,.3);font-size:16px;cursor:pointer;touch-action:manipulation;padding:4px 8px 4px 0;}
.reader-meta{flex:1;}
.reader-title{font-size:14px;color:rgba(255,255,255,.7);letter-spacing:1px;}
.reader-author{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:1px;margin-top:2px;}
.reader-acts{display:flex;gap:8px;flex-shrink:0;}
.reader-src{background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);font-family:'Shippori Mincho',serif;font-size:11px;padding:8px 14px;cursor:pointer;text-decoration:none;display:inline-block;letter-spacing:1px;touch-action:manipulation;}
.reader-ret{background:none;border:1px solid rgba(200,100,40,.4);color:rgba(200,120,40,.75);font-family:'Shippori Mincho',serif;font-size:11px;padding:8px 14px;cursor:pointer;touch-action:manipulation;letter-spacing:1px;}
.reader-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 20px 40px;-webkit-overflow-scrolling:touch;}
.reader-text{writing-mode:vertical-rl;font-family:'Zen Old Mincho','Shippori Mincho',serif;font-size:17px;line-height:2.1;letter-spacing:.1em;color:rgba(240,228,210,.78);height:100%;min-height:calc(100vw - 40px);}

/* ===== 使い方ガイド ===== */
#guide-overlay{
  position:absolute;inset:0;z-index:800;background:rgba(0,0,0,.9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 28px;opacity:0;pointer-events:none;transition:opacity .4s;
}
#guide-overlay.show{opacity:1;pointer-events:all;}
.guide-title{font-family:'IM Fell English',serif;font-style:italic;font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.4);margin-bottom:28px;}
.guide-items{width:100%;display:flex;flex-direction:column;gap:16px;margin-bottom:36px;}
.guide-item{display:flex;align-items:flex-start;gap:16px;}
.guide-arrow{font-size:20px;width:32px;text-align:center;flex-shrink:0;color:rgba(255,255,255,.5);margin-top:2px;}
.guide-desc{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px;line-height:1.8;}
.guide-desc strong{color:rgba(255,255,255,.85);display:block;font-size:13px;margin-bottom:1px;}
.guide-close{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);font-family:'Shippori Mincho',serif;font-size:12px;letter-spacing:3px;padding:12px 32px;cursor:pointer;touch-action:manipulation;transition:all .2s;}
.guide-close:active{background:rgba(255,255,255,.08);}
.guide-note-link{margin-top:16px;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.3);text-decoration:none;}

/* ===== シェアモーダル ===== */
#share-overlay{
  position:absolute;inset:0;z-index:700;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.8);padding:24px;
}
#share-overlay.show{display:flex;}
#share-card{
  background:#0e0c0a;width:100%;max-width:340px;
  padding:28px 24px 24px;border:1px solid rgba(255,255,255,.08);
}
.share-accent-line{height:1px;margin-bottom:20px;}
.share-first-sentence{
  writing-mode:vertical-rl;font-family:'Zen Old Mincho',serif;
  font-size:18px;line-height:2.0;letter-spacing:.12em;
  color:rgba(240,228,210,.95);
  max-height:220px;overflow:hidden;
  align-self:flex-end;display:block;margin:0 auto 20px;
}

<script>
// 墨滲みアニメーション削除済み

// ===== CONSTANTS =====
const BASE_URL   = 'https://raw.githubusercontent.com/aozorahack/aozorabunko_text/master/';
const AOZORA_URL = 'https://www.aozora.gr.jp/cards/';
let BOOKLIST = null;

const AUTHOR_GENRE = {
  // 純文学
  '夏目漱石':'純文学','芥川竜之介':'純文学','太宰治':'純文学','森鴎外':'純文学',
  '志賀直哉':'純文学','有島武郎':'純文学','国木田独歩':'純文学','島崎藤村':'純文学',
  '田山花袋':'純文学','川端康成':'純文学','梶井基次郎':'純文学','横光利一':'純文学',
  '葛西善蔵':'純文学','坂口安吾':'純文学','織田作之助':'純文学',
  '萩原朔太郎':'純文学','牧野信一':'純文学',
  // 恋愛・情念
  '谷崎潤一郎':'恋愛・情念','永井荷風':'恋愛・情念',
  '岡本かの子':'恋愛・情念','林芙美子':'恋愛・情念',
  // 幻想・耽美
  '宮沢賢治':'幻想・耽美','泉鏡花':'幻想・耽美',
  '久生十蘭':'幻想・耽美','国枝史郎':'幻想・耽美',
  // 探偵・推理
  '江戸川乱歩':'探偵・推理','夢野久作':'探偵・推理',
  '小酒井不木':'探偵・推理','浜尾四郎':'探偵・推理','海野十三':'探偵・推理',
  // 怪談・怪異
  '田中貢太郎':'怪談・怪異','岡本綺堂':'怪談・怪異',
  // 歴史・時代
  '吉川英治':'歴史・時代','山本周五郎':'歴史・時代','菊池寛':'歴史・時代',
  '佐々木味津三':'歴史・時代',
  // 社会・風俗
  '宮本百合子':'社会・風俗','尾崎士郎':'社会・風俗',
};

const GENRE_ACCENT = {
  '純文学':'#e8a04a','探偵・推理':'#4a9cc8','怪談・怪異':'#a050d0',
  '恋愛・情念':'#d04070','歴史・時代':'#c88030','幻想・耽美':'#30b060','社会・風俗':'#40a060'
};

function cleanText(raw){
  const parts = raw.split(/\-{10,}/);
  let body = parts.length >= 3 ? parts[2] : parts[parts.length-1];
  body = body.split('底本：')[0];
  body = body
    .replace(/《[^》]*》/g,'').replace(/｜/g,'')
    .replace(/〔[^〕]*〕/g,'').replace(/［＃[^］]*］/g,'')
    .replace(/\r\n/g,'\n').replace(/\r/g,'\n')
    .replace(/\n{3,}/g,'\n\n').trim();
  const cut = body.slice(0,200);
  const lastKuten = cut.lastIndexOf('。');
  return lastKuten !== -1 ? cut.slice(0,lastKuten+1) : cut.slice(0,150);
}

function getFirstSentence(text){
  if(!text) return '';
  const idx = text.indexOf('。');
  if(idx === -1 || idx > 80) return text.slice(0,50);
  return text.slice(0, idx+1);
}

function toAozoraUrl(path){
  const m = path.match(/cards\/(\d+)\/files\/(\d+)_/);
  return m ? AOZORA_URL+m[1]+'/card'+m[2]+'.html' : '#';
}

const textCache = {};
async function fetchText(path){
  if(textCache[path]) return textCache[path];
  const r = await fetch(BASE_URL+path);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const buf = await r.arrayBuffer();
  const text = new TextDecoder('shift_jis').decode(buf);
  const clean = cleanText(text);
  textCache[path] = clean;
  return clean;
}

// ===== STATE =====
let list=[], cur=0, shelf=new Map(), transitioning=false, filterVal='all';
const deck = document.getElementById('deck');
let cards = [];

function setCardText(el, text){
  const w = el.querySelector('.card-text');
  if(w){ w.textContent=text; w.classList.remove('card-loading-txt'); w.style.animation='none'; w.style.color=''; }
  el.classList.remove('is-loading');
}
function setCardError(el){
  const w = el.querySelector('.card-text');
  if(w) w.textContent = '本文の取得に失敗しました。';
  el.classList.remove('is-loading');
}

function buildCard(w, idx){
  const genre = AUTHOR_GENRE[w.author] || '純文学';
  const el = document.createElement('div');
  el.className = 'card is-loading';
  el.dataset.idx = idx;
  el.dataset.id   = w.id;
  el.dataset.path = w.path;
  el.dataset.g    = genre;
  el.innerHTML =
    '<div class="card-bg"></div>'+
    '<div class="card-accent"></div>'+
    '<div class="card-top">'+
      '<span class="genre-badge">'+genre+'</span>'+
      '<span class="pattern-name">loading...</span>'+
    '</div>'+
    '<div class="card-text-wrap">'+
      '<div class="card-text card-loading-txt">―　読み込み中　―</div>'+
    '</div>';
  return el;
}

function showLoadErrorCard(){
  deck.innerHTML='';
  cards=[];
  var el=document.createElement('div');
  el.className='card is-current';
  el.dataset.g='純文学';
  el.style.transform='translateY(0)';
  el.style.opacity='1';
  el.innerHTML=
    '<div class="card-bg"></div>'+
    '<div class="card-accent"></div>'+
    '<div class="card-top">'+
      '<span class="genre-badge">INFO</span>'+
      '<span class="pattern-name">loading failed</span>'+
    '</div>'+
    '<div class="card-text-wrap">'+
      '<div class="card-text">作品一覧を読み込めませんでした。少し待って再読み込みしてください。</div>'+
    '</div>';
  deck.appendChild(el);
  cards=[el];
  var ae=document.getElementById('action-author');
  var te=document.getElementById('action-title');
  var se=document.getElementById('action-src');
  if(ae) ae.textContent='冒頭収集館';
  if(te) te.textContent='作品一覧の読み込みに失敗しました';
  if(se) se.href='#';
  document.body.setAttribute('data-genre','純文学');
  updateProgress();
}

function build(){
  if(!list.length){
    showLoadErrorCard();
    return;
  }
  deck.innerHTML=''; cards=[];
  list.forEach(function(w,i){
    var el = buildCard(w,i);
    if(i===0) el.classList.add('is-current');
    deck.appendChild(el);
    cards.push(el);
  });
  cur=0;
  updateProgress();
  updateActionBar();
  prefetch(0);
}

async function prefetch(idx){
  var targets=[idx,idx+1,idx+2].filter(function(i){return i>=0&&i<list.length;});
  for(var i=0;i<targets.length;i++){
    var ti=targets[i], w=list[ti];
    if(textCache[w.path]){ updateCardText(ti); continue; }
    try{ await fetchText(w.path); updateCardText(ti); }
    catch(e){ if(cards[ti]) setCardError(cards[ti]); }
  }
}

function updateCardText(idx){
  var w=list[idx], card=cards[idx];
  if(!card||!w) return;
  var text=textCache[w.path];
  if(!text) return;
  setCardText(card,text);
  if(shelf.has(w.id)) shelf.get(w.id).text=text;
  var first=text.charAt(0);
  var pattern=/「|『/.test(first)?'セリフ始まり':/[一-龠ぁ-ん]/.test(first)?'散文':'書き出し';
  var pEl=card.querySelector('.pattern-name');
  if(pEl) pEl.textContent=pattern;
}

function goTo(next){
  if(transitioning||next<0||next>=cards.length) return;
  transitioning=true;
  var prev=cards[cur], nextEl=cards[next], goDown=next>cur;
  prev.classList.remove('is-current');
  prev.style.transform=goDown?'translateY(-100vh)':'translateY(100vh)';
  prev.style.opacity='0';
  nextEl.style.transition='none';
  nextEl.style.transform=goDown?'translateY(100vh)':'translateY(-100vh)';
  nextEl.style.opacity='0';
  nextEl.getBoundingClientRect();
  nextEl.style.transition='';
  nextEl.classList.add('is-current');
  nextEl.style.transform='translateY(0)';
  nextEl.style.opacity='1';
  cur=next;
  updateProgress();
  updateActionBar();
  prefetch(next+1);
  setTimeout(function(){
    prev.style.transform=''; prev.style.opacity=''; transitioning=false;
  },500);
}

function updateProgress(){
  var prog=document.getElementById('progress');
  var total=Math.min(cards.length,14);
  if(total<2){prog.innerHTML='';return;}
  prog.innerHTML=Array.from({length:total},function(_,i){
    var mapped=Math.round((i/(total-1))*(cards.length-1));
    var on=mapped===cur||(i===total-1&&cur===cards.length-1);
    return '<div class="prog-dot'+(on?' on':'')+'"></div>';
  }).join('');
  var counter=document.getElementById('card-counter');
  if(counter) counter.textContent=(cur+1)+' / '+list.length;
}

function updateActionBar(){
  var w=list[cur]; if(!w) return;
  var ae=document.getElementById('action-author');
  var te=document.getElementById('action-title');
  var se=document.getElementById('action-src');
  if(ae) ae.textContent=w.author;
  if(te) te.textContent='『'+w.title+'』';
  if(se) se.href=toAozoraUrl(w.path);
  updateShelfBtn();
  document.body.setAttribute('data-genre', AUTHOR_GENRE[w.author]||'純文学');
  // グラデーション背景を常時うっすら表示（swiping時は濃くなる）
  var gb=document.getElementById('grad-bg');
  if(gb) gb.classList.add('active');
}

function updateShelfBtn(){
  var sb=document.getElementById('btn-shelf');
  var bd=document.getElementById('shelf-badge');
  var n=shelf.size;
  if(bd){ bd.style.display=n>0?'flex':'none'; bd.textContent=n; }
  if(sb) sb.classList.toggle('has-items',n>0);
}

function saveCurrentToShelf(){
  var w=list[cur]; if(!w) return;
  var genre=AUTHOR_GENRE[w.author]||'純文学';
  if(!shelf.has(w.id)){
    shelf.set(w.id,{
      id:w.id, title:w.title, author:w.author,
      path:w.path, text:textCache[w.path]||null, genre:genre
    });
    updateShelfBtn();
    // バウンスアニメーション
    var sb=document.getElementById('btn-shelf');
    if(sb){
      sb.classList.remove('bounce');
      void sb.offsetWidth;
      sb.classList.add('bounce');
      sb.addEventListener('animationend',function(){sb.classList.remove('bounce');},{once:true});
    }
    // トースト
    var toast=document.getElementById('saved-toast');
    if(toast){
      toast.classList.remove('show');
      void toast.offsetWidth;
      toast.classList.add('show');
      toast.addEventListener('animationend',function(){toast.classList.remove('show');},{once:true});
    }
  } else {
    // 既に保存済みなら書棚を開く
    openShelf();
  }
}

function showBgOverlay(){
  document.getElementById('bg-overlay').classList.add('active');
  var gb=document.getElementById('grad-bg');
  if(gb){gb.classList.add('active');gb.classList.add('swiping');}
  cards[cur]&&cards[cur].classList.add('swiping-active');
}
function hideBgOverlay(){
  setTimeout(function(){
    document.getElementById('bg-overlay').classList.remove('active');
    var gb=document.getElementById('grad-bg');
    if(gb) gb.classList.remove('swiping');
  },300);
  cards[cur]&&cards[cur].classList.remove('swiping-active');
}

// ===== SWIPE =====
var ty0=0,tx0=0,swiping=false,swipeDelta=0;
deck.addEventListener('touchstart',function(e){
  if(e.target.closest('button,a'))return;
  ty0=e.touches[0].clientY; tx0=e.touches[0].clientX;
  swiping=false; swipeDelta=0;
},{passive:true});
deck.addEventListener('touchmove',function(e){
  if(e.target.closest('button,a'))return;
  var dy=e.touches[0].clientY-ty0, dx=e.touches[0].clientX-tx0;
  if(!swiping){ if(Math.abs(dy)>8&&Math.abs(dy)>Math.abs(dx)) swiping=true; else return; }
  e.preventDefault(); swipeDelta=dy; showBgOverlay();
  var card=cards[cur]; if(!card)return;
  var resist=Math.abs(dy)>80?80+(Math.abs(dy)-80)*.15:Math.abs(dy);
  card.style.transition='none';
  card.style.transform='translateY('+(dy>0?resist:-resist)+'px)';
},{passive:false});
deck.addEventListener('touchend',function(){
  hideBgOverlay();
  var card=cards[cur];
  if(card){card.style.transition='';card.style.transform='';}
  if(!swiping)return; swiping=false;
  if(swipeDelta<-55) goTo(cur+1);
  else if(swipeDelta>55) goTo(cur-1);
},{passive:true});
deck.addEventListener('touchcancel',function(){
  hideBgOverlay(); swiping=false;
  var card=cards[cur]; if(card){card.style.transition='';card.style.transform='';}
},{passive:true});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowDown'||e.key==='j') goTo(cur+1);
  if(e.key==='ArrowUp'  ||e.key==='k') goTo(cur-1);
});

// ===== 📚ボタン：保存 or 書棚を開く =====
document.getElementById('btn-shelf').addEventListener('click',function(){
  saveCurrentToShelf();
});
// 長押しで書棚を開く
document.getElementById('btn-shelf').addEventListener('contextmenu',function(e){
  e.preventDefault(); openShelf();
});

// ===== FILTER =====
var filterDrawer=document.getElementById('filter-drawer');
document.getElementById('btn-filter').addEventListener('click',function(){filterDrawer.classList.toggle('open');});
document.getElementById('filter-backdrop').addEventListener('click',function(){filterDrawer.classList.remove('open');});
document.querySelectorAll('.f-item').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.f-item').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    filterVal=b.dataset.f;
    applyFilter();
    filterDrawer.classList.remove('open');
  });
});
function applyFilter(){
  if(!BOOKLIST)return;
  list=filterVal==='all'?[...BOOKLIST]:BOOKLIST.filter(function(w){return (AUTHOR_GENRE[w.author]||'純文学')===filterVal;});
  build();
}

// ===== SHELF =====
function openShelf(){
  document.getElementById('shelf-drawer').classList.add('open');
  showShelfList();
}
document.getElementById('shelf-close').addEventListener('click',function(){document.getElementById('shelf-drawer').classList.remove('open');});
document.getElementById('reader-back').addEventListener('click',showShelfList);

function showShelfList(){
  document.getElementById('shelf-list-view').style.display='flex';
  document.getElementById('shelf-reader-view').style.display='none';
  renderShelf();
}
async function showReader(id){
  var item=shelf.get(id); if(!item)return;
  document.getElementById('shelf-list-view').style.display='none';
  document.getElementById('shelf-reader-view').style.display='flex';
  document.getElementById('reader-title').textContent='『'+item.title+'』';
  document.getElementById('reader-author').textContent=item.author;
  document.getElementById('reader-src').href=toAozoraUrl(item.path);
  var textEl=document.getElementById('reader-text');
  if(item.text){ textEl.textContent=item.text; }
  else{
    textEl.textContent='読み込み中…';
    try{ var t=await fetchText(item.path); item.text=t; textEl.textContent=t; }
    catch(e){ textEl.textContent='取得に失敗しました。'; }
  }
  document.getElementById('reader-ret').onclick=function(){
    shelf.delete(id); updateShelfBtn(); showShelfList();
  };
}
function renderShelf(){
  var bd=document.getElementById('shelf-bd');
  if(!shelf.size){
    bd.innerHTML='<div class="shelf-empty">まだ何も保存していません<br><br>📚ボタンで気になった冒頭を保存</div>';
    return;
  }
  bd.innerHTML=[...shelf.entries()].map(function(e){
    var id=e[0], item=e[1];
    return '<div class="s-item" data-id="'+id+'">'+
      '<div class="s-info">'+
        '<div class="s-ttl">『'+item.title+'』</div>'+
        '<div class="s-auth">'+item.author+'</div>'+
      '</div>'+
      '<span class="s-arrow">›</span>'+
    '</div>';
  }).join('');
  bd.querySelectorAll('.s-item').forEach(function(el){
    el.addEventListener('click',function(){showReader(el.dataset.id);});
  });
}

// ===== シェア =====
document.getElementById('btn-share').addEventListener('click',function(){
  var w=list[cur]; if(!w)return;
  var text=textCache[w.path]||'';
  var sentence=getFirstSentence(text);
  var genre=AUTHOR_GENRE[w.author]||'純文学';
  var accent=GENRE_ACCENT[genre]||'#e8a04a';
  document.getElementById('share-sentence').textContent=sentence;
  document.getElementById('share-author').textContent=w.author;
  document.getElementById('share-work').textContent='『'+w.title+'』';
  document.getElementById('share-accent-line').style.background='linear-gradient(90deg,'+accent+',transparent)';
  document.getElementById('share-overlay').classList.add('show');
});
document.getElementById('share-close-btn').addEventListener('click',function(){
  document.getElementById('share-overlay').classList.remove('show');
});
document.getElementById('share-img-btn').addEventListener('click',async function(){
  var btn=this; btn.textContent='生成中…'; btn.disabled=true;
  try{
    var card=document.getElementById('share-card');
    var canvas=await html2canvas(card,{backgroundColor:'#0e0c0a',scale:2,useCORS:true,logging:false});
    var w=list[cur];
    var link=document.createElement('a');
    link.download='boutou_'+(w?w.author:'unknown')+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
  }catch(e){
    alert('保存に失敗しました。スクリーンショットをご利用ください。');
  }finally{
    btn.textContent='画像保存'; btn.disabled=false;
    document.getElementById('share-overlay').classList.remove('show');
  }
});
document.getElementById('share-x-btn').addEventListener('click',function(){
  var w=list[cur]; if(!w)return;
  var tweetText=
    w.author+'『'+w.title+'』の冒頭を収集しました。\n\n'+
    '#冒頭収集館 #青空文庫';
  var url='https://boutou-shuushukan.vercel.app';
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(tweetText)+'&url='+encodeURIComponent(url),'_blank','noopener');
  document.getElementById('share-overlay').classList.remove('show');
});

// ===== 使い方ガイド =====
var GUIDE_KEY='boutou_guide_v1';
document.getElementById('guide-close').addEventListener('click',function(){
  document.getElementById('guide-overlay').classList.remove('show');
  localStorage.setItem(GUIDE_KEY,'done');
});
document.getElementById('btn-guide').addEventListener('click',function(){
  document.getElementById('guide-overlay').classList.add('show');
});

// ===== 初期化 =====
var styleEl=document.createElement('style');
styleEl.textContent=
  '.is-loading .card-text{color:rgba(255,255,255,.15)!important;font-style:italic}'+
  '@keyframes shimmer{0%,100%{opacity:.15}50%{opacity:.3}}'+
  '.card-loading-txt{animation:shimmer 1.5s ease infinite}';
document.head.appendChild(styleEl);

async function init(){
  var candidates=[
    './booklist.json',
    'https://raw.githubusercontent.com/memetomamoru-maker/boutou-shuushukan/main/booklist.json'
  ];
  BOOKLIST=[];
  for(var i=0;i<candidates.length;i++){
    try{
      var r=await fetch(candidates[i],{cache:'no-store'});
      if(!r.ok) continue;
      BOOKLIST=await r.json();
      if(Array.isArray(BOOKLIST) && BOOKLIST.length) break;
    }catch(e){}
  }
  if(!Array.isArray(BOOKLIST)) BOOKLIST=[];
  list=[...BOOKLIST];
  build();
  if(!localStorage.getItem(GUIDE_KEY)){
    document.getElementById('guide-overlay').classList.add('show');
  }
}
init();
</script>
